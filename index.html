<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcemente - Dulces Artesanales a Domicilio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Nunito', 'sans-serif'],
                        'display': ['Pacifico', 'cursive'],
                    },
                    colors: {
                        'pastel-pink': '#FFB6C1',
                        'pastel-pink-dark': '#FF69B4',
                        'pastel-cream': '#FFF8E7',
                        'pastel-mint': '#98FF98',
                        'pastel-lavender': '#E6E6FA',
                        'pastel-peach': '#FFDAB9',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #FFF8E7 0%, #FFE4E1 50%, #F0FFF0 100%);
            min-height: 100vh;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .sweet-shadow {
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.3);
        }
        .btn-hover {
            transition: all 0.3s ease;
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
        }
        .product-card {
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.4);
        }
        .floating-whatsapp {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #FF69B4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ========== CONFIGURACIÓN DE SUPABASE ==========
        const SUPABASE_URL = 'https://gejvthepkxlpsbayuvai.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gP3rd7bb43vuGaTbcTzMNg_Tw02V78w';
        
        // Verificar que Supabase esté cargado
        if (typeof supabaseJs === 'undefined' && typeof supabase === 'undefined') {
            document.getElementById('root').innerHTML = `<div class="p-8 text-center text-red-600">Error: No se pudo cargar Supabase. Recarga la página.</div>`;
            throw new Error('Supabase no disponible');
        }
        const SupabaseClient = window.supabaseJs || window.supabase;
        const supabase = SupabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [cart, setCart] = useState([]);
            const [quantities, setQuantities] = useState({});
            const [formData, setFormData] = useState({
                name: '',
                address: '',
                city: '',
                phone: '',
                observations: ''
            });
            const [showAlert, setShowAlert] = useState(false);
            const [alertMessage, setAlertMessage] = useState('');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const cartRef = useRef(null);

            // Cargar productos desde Supabase
            useEffect(() => {
                const fetchProducts = async () => {
                    setLoading(true);
                    setError(null);
                    try {
                        const { data, error } = await supabase
                            .from('products')
                            .select('*')
                            .order('created_at', { ascending: false });
                        if (error) throw new Error(error.message);
                        if (data && data.length > 0) {
                            setProducts(data);
                            // Inicializar cantidades para cada producto
                            const initialQuantities = {};
                            data.forEach(p => initialQuantities[p.id] = 1);
                            setQuantities(initialQuantities);
                        } else {
                            // Si no hay productos, mostrar mensaje
                            setProducts([]);
                        }
                    } catch (err) {
                        console.error(err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchProducts();
            }, []);

            useEffect(() => {
                if (cartRef.current) {
                    cartRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, [cart]);

            const showNotification = (message) => {
                setAlertMessage(message);
                setShowAlert(true);
                setTimeout(() => setShowAlert(false), 3000);
            };

            const handleQuantityChange = (productId, value) => {
                const qty = parseInt(value) || 1;
                setQuantities({ ...quantities, [productId]: Math.max(1, qty) });
            };

            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                const quantity = quantities[product.id] || 1;
                
                if (existingItem) {
                    setCart(cart.map(item => 
                        item.id === product.id 
                            ? { ...item, quantity: item.quantity + quantity }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity }]);
                }
                
                showNotification(`¡${product.name} añadido al pedido!`);
                setIsCartOpen(true);
            };

            const updateCartQuantity = (productId, newQuantity) => {
                if (newQuantity < 1) {
                    removeFromCart(productId);
                    return;
                }
                setCart(cart.map(item => 
                    item.id === productId ? { ...item, quantity: newQuantity } : item
                ));
            };

            const removeFromCart = (productId) => {
                const item = cart.find(i => i.id === productId);
                setCart(cart.filter(item => item.id !== productId));
                if (item) {
                    showNotification(`${item.name} eliminado del pedido`);
                }
            };

            const getTotal = () => {
                return cart.reduce((total, item) => total + (item.price * item.quantity), 0).toFixed(2);
            };

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const generateWhatsAppMessage = () => {
                if (cart.length === 0) {
                    showNotification('¡Agrega productos al pedido primero!');
                    return;
                }

                if (!formData.name || !formData.address || !formData.city || !formData.phone) {
                    showNotification('¡Completa todos los campos obligatorios!');
                    return;
                }

                let message = "🍭 *PEDIDO DULCEMENTE* 🍭\n\n";
                message += "*Productos:*\n";
                
                cart.forEach(item => {
                    const subtotal = (item.price * item.quantity).toFixed(2);
                    message += `• ${item.name} x${item.quantity} - ${subtotal} CUP\n`;
                });
                
                message += `\n*Total: ${getTotal()} CUP*\n\n`;
                message += "*Datos de envío:*\n";
                message += `👤 Nombre: ${formData.name}\n`;
                message += `📍 Dirección: ${formData.address}\n`;
                message += `🏙️ Municipio: ${formData.city}\n`;
                message += `📱 Teléfono: ${formData.phone}\n`;
                
                if (formData.observations) {
                    message += `📝 Observaciones: ${formData.observations}\n`;
                }

                const encodedMessage = encodeURIComponent(message);
                const whatsappUrl = `https://wa.me/5356083109?text=${encodedMessage}`;
                
                showNotification('¡Redirigiendo a WhatsApp...');
                setTimeout(() => {
                    window.open(whatsappUrl, '_blank');
                }, 1500);
            };

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="loading-spinner"></div>
                            <p className="mt-4 text-gray-600">Cargando nuestros dulces...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-6 rounded-xl max-w-md">
                            <i className="fas fa-exclamation-triangle text-2xl mr-2"></i>
                            <strong>Error al cargar productos:</strong>
                            <p className="mt-2">{error}</p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="mt-4 bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600"
                            >
                                Reintentar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Alert Notification */}
                    {showAlert && (
                        <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 fade-in">
                            <div className="bg-pastel-pink-dark text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2">
                                <i className="fas fa-check-circle"></i>
                                <span className="font-semibold">{alertMessage}</span>
                            </div>
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="glass-effect fixed w-full top-0 z-40 sweet-shadow">
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <i className="fas fa-candy-cane text-3xl text-pastel-pink-dark"></i>
                                    <span className="font-display text-2xl text-pink-600">Dulcemente</span>
                                </div>
                                <div className="hidden md:flex gap-8">
                                    <button onClick={() => scrollToSection('inicio')} className="text-gray-700 hover:text-pink-600 font-semibold transition">Inicio</button>
                                    <button onClick={() => scrollToSection('productos')} className="text-gray-700 hover:text-pink-600 font-semibold transition">Productos</button>
                                    <button onClick={() => scrollToSection('pedido')} className="text-gray-700 hover:text-pink-600 font-semibold transition">Cómo Pedir</button>
                                    <button onClick={() => scrollToSection('contacto')} className="text-gray-700 hover:text-pink-600 font-semibold transition">Contacto</button>
                                </div>
                                <button 
                                    onClick={() => setIsCartOpen(!isCartOpen)}
                                    className="relative bg-pastel-pink text-pink-700 px-4 py-2 rounded-full font-bold hover:bg-pink-300 transition"
                                >
                                    <i className="fas fa-shopping-bag mr-2"></i>
                                    Pedido
                                    {cart.length > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-pink-600 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center">
                                            {cart.reduce((sum, item) => sum + item.quantity, 0)}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="inicio" className="pt-32 pb-16 px-4">
                        <div className="container mx-auto text-center">
                            <div className="glass-effect rounded-3xl p-8 md:p-16 sweet-shadow max-w-4xl mx-auto">
                                <h1 className="font-display text-4xl md:text-6xl text-pink-600 mb-4">
                                    Endulza tu Vida
                                </h1>
                                <p className="text-xl md:text-2xl text-gray-600 mb-2 font-semibold">
                                    "Momentos dulces, recuerdos eternos"
                                </p>
                                <p className="text-gray-500 mb-8 max-w-2xl mx-auto">
                                    Descubre nuestra selección de dulces artesanales preparados con amor. 
                                    Envío a domicilio en toda la ciudad.
                                </p>
                                <button 
                                    onClick={() => scrollToSection('productos')}
                                    className="bg-pastel-pink-dark text-white px-8 py-4 rounded-full text-lg font-bold btn-hover shadow-lg"
                                >
                                    <i className="fas fa-cookie-bite mr-2"></i>
                                    Ver Productos
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Products Section */}
                    <section id="productos" className="py-16 px-4">
                        <div className="container mx-auto">
                            <h2 className="font-display text-3xl md:text-4xl text-center text-pink-600 mb-12">
                                Nuestros Dulces
                            </h2>
                            {products.length === 0 ? (
                                <div className="text-center py-12">
                                    <i className="fas fa-candy-cane text-6xl text-gray-300 mb-4"></i>
                                    <p className="text-gray-400 text-lg">Pronto tendremos nuevos productos disponibles.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {products.map(product => (
                                        <div key={product.id} className="product-card glass-effect rounded-2xl overflow-hidden sweet-shadow">
                                            <div className="h-48 overflow-hidden">
                                                <img 
                                                    src={product.image} 
                                                    alt={product.name}
                                                    className="w-full h-full object-cover hover:scale-110 transition duration-500"
                                                    onError={(e) => {
                                                        e.target.src = 'https://via.placeholder.com/400x300/FFB6C1/FFFFFF?text=Dulcemente';
                                                    }}
                                                />
                                            </div>
                                            <div className="p-6">
                                                <h3 className="font-bold text-lg text-gray-800 mb-1">{product.name}</h3>
                                                <p className="text-gray-500 text-sm mb-3">{product.description || 'Delicioso dulce artesanal'}</p>
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="text-2xl font-bold text-pink-600">{product.price} CUP</span>
                                                    <div className="flex items-center gap-2">
                                                        <button 
                                                            onClick={() => handleQuantityChange(product.id, (quantities[product.id] || 1) - 1)}
                                                            className="w-8 h-8 rounded-full bg-pastel-cream text-pink-600 font-bold hover:bg-pink-200 transition"
                                                        >-</button>
                                                        <input 
                                                            type="number" 
                                                            min="1"
                                                            value={quantities[product.id] || 1}
                                                            onChange={(e) => handleQuantityChange(product.id, e.target.value)}
                                                            className="w-12 text-center bg-transparent font-bold text-gray-700"
                                                        />
                                                        <button 
                                                            onClick={() => handleQuantityChange(product.id, (quantities[product.id] || 1) + 1)}
                                                            className="w-8 h-8 rounded-full bg-pastel-cream text-pink-600 font-bold hover:bg-pink-200 transition"
                                                        >+</button>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => addToCart(product)}
                                                    className="w-full bg-pastel-pink text-pink-700 py-3 rounded-xl font-bold btn-hover hover:bg-pink-300 transition flex items-center justify-center gap-2"
                                                >
                                                    <i className="fas fa-plus"></i>
                                                    Añadir al Pedido
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Cart & Order Section */}
                    <section id="pedido" ref={cartRef} className="py-16 px-4">
                        <div className="container mx-auto max-w-4xl">
                            <h2 className="font-display text-3xl md:text-4xl text-center text-pink-600 mb-12">
                                Tu Pedido
                            </h2>
                            
                            <div className="glass-effect rounded-3xl p-6 md:p-8 sweet-shadow">
                                {cart.length === 0 ? (
                                    <div className="text-center py-12">
                                        <i className="fas fa-shopping-basket text-6xl text-pastel-pink mb-4"></i>
                                        <p className="text-gray-500 text-lg">Tu pedido está vacío</p>
                                        <p className="text-gray-400">¡Agrega algunos dulces deliciosos!</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4 mb-8">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex items-center justify-between bg-white/50 rounded-xl p-4">
                                                <div className="flex items-center gap-4">
                                                    <img src={item.image} alt={item.name} className="w-16 h-16 rounded-lg object-cover" />
                                                    <div>
                                                        <h4 className="font-bold text-gray-800">{item.name}</h4>
                                                        <p className="text-pink-600 font-semibold">{item.price} CUP c/u</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-center gap-2 bg-pastel-cream rounded-full px-3 py-1">
                                                        <button 
                                                            onClick={() => updateCartQuantity(item.id, item.quantity - 1)}
                                                            className="w-6 h-6 rounded-full bg-white text-pink-600 font-bold hover:bg-pink-200 transition text-sm"
                                                        >-</button>
                                                        <span className="font-bold text-gray-700 w-6 text-center">{item.quantity}</span>
                                                        <button 
                                                            onClick={() => updateCartQuantity(item.id, item.quantity + 1)}
                                                            className="w-6 h-6 rounded-full bg-white text-pink-600 font-bold hover:bg-pink-200 transition text-sm"
                                                        >+</button>
                                                    </div>
                                                    <span className="font-bold text-pink-600 min-w-[80px] text-right">
                                                        {(item.price * item.quantity).toFixed(2)} CUP
                                                    </span>
                                                    <button 
                                                        onClick={() => removeFromCart(item.id)}
                                                        className="text-red-400 hover:text-red-600 transition p-2"
                                                    >
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="border-t-2 border-pink-200 pt-4 mt-4">
                                            <div className="flex justify-between items-center text-xl font-bold">
                                                <span className="text-gray-700">Total:</span>
                                                <span className="text-pink-600 text-2xl">{getTotal()} CUP</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Customer Form */}
                                <div className="border-t-2 border-pink-100 pt-8">
                                    <h3 className="font-bold text-xl text-gray-800 mb-6 flex items-center gap-2">
                                        <i className="fas fa-truck text-pastel-pink-dark"></i>
                                        Datos de Envío
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-600 mb-2">
                                                Nombre completo *
                                            </label>
                                            <input 
                                                type="text" 
                                                name="name"
                                                value={formData.name}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-white/80"
                                                placeholder="Tu nombre"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-600 mb-2">
                                                Teléfono *
                                            </label>
                                            <input 
                                                type="tel" 
                                                name="phone"
                                                value={formData.phone}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-white/80"
                                                placeholder="+53 5XXXXXXX"
                                                required
                                            />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-semibold text-gray-600 mb-2">
                                                Dirección de residencia *
                                            </label>
                                            <input 
                                                type="text" 
                                                name="address"
                                                value={formData.address}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-white/80"
                                                placeholder="Calle, número, entre calles, reparto"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-600 mb-2">
                                                Municipio *
                                            </label>
                                            <input 
                                                type="text" 
                                                name="city"
                                                value={formData.city}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-white/80"
                                                placeholder="Tu municipio"
                                                required
                                            />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-semibold text-gray-600 mb-2">
                                                Observaciones / Instrucciones adicionales
                                            </label>
                                            <textarea 
                                                name="observations"
                                                value={formData.observations}
                                                onChange={handleInputChange}
                                                rows="3"
                                                className="w-full px-4 py-3 rounded-xl border-2 border-pink-200 focus:border-pink-400 focus:outline-none bg-white/80 resize-none"
                                                placeholder="Ej: Tocar el timbre, dejar en portería, etc."
                                            ></textarea>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={generateWhatsAppMessage}
                                        className="w-full mt-6 bg-green-500 text-white py-4 rounded-xl font-bold text-lg btn-hover shadow-lg flex items-center justify-center gap-3"
                                    >
                                        <i className="fab fa-whatsapp text-2xl"></i>
                                        Generar Pedido por WhatsApp
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* How to Order Section */}
                    <section className="py-16 px-4 bg-white/30">
                        <div className="container mx-auto">
                            <h2 className="font-display text-3xl text-center text-pink-600 mb-12">
                                ¿Cómo Pedir?
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-4xl mx-auto">
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-pastel-pink rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-pink-600">
                                        <i className="fas fa-mouse-pointer"></i>
                                    </div>
                                    <h3 className="font-bold text-lg mb-2">1. Elige</h3>
                                    <p className="text-gray-600">Selecciona tus dulces favoritos y la cantidad deseada</p>
                                </div>
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-pastel-mint rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-green-600">
                                        <i className="fas fa-clipboard-list"></i>
                                    </div>
                                    <h3 className="font-bold text-lg mb-2">2. Completa</h3>
                                    <p className="text-gray-600">Llena tus datos de envío y revisa tu pedido</p>
                                </div>
                                <div className="text-center">
